<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Hero Video Renderer</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/loaders/GLTFLoader.js"></script>
  <script>
    var WIDTH = 1920;
    var HEIGHT = 1080;
    var FPS = 30;
    var DURATION = 18;
    var TOTAL_FRAMES = FPS * DURATION;

    var scene = new THREE.Scene();
    scene.background = new THREE.Color(0x040406);
    scene.fog = new THREE.FogExp2(0x040406, 0.012);

    var camera = new THREE.PerspectiveCamera(35, WIDTH / HEIGHT, 0.1, 500);
    var renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(WIDTH, HEIGHT);
    renderer.setPixelRatio(1);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    var ambientLight = new THREE.AmbientLight(0x1a1a2e, 0.5);
    scene.add(ambientLight);

    var keyLight = new THREE.DirectionalLight(0xf7e4aa, 3.0);
    keyLight.position.set(8, 12, 8);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(4096, 4096);
    keyLight.shadow.camera.near = 0.5;
    keyLight.shadow.camera.far = 50;
    keyLight.shadow.camera.left = -10;
    keyLight.shadow.camera.right = 10;
    keyLight.shadow.camera.top = 10;
    keyLight.shadow.camera.bottom = -10;
    keyLight.shadow.bias = -0.001;
    keyLight.shadow.normalBias = 0.02;
    scene.add(keyLight);

    var fillLight = new THREE.DirectionalLight(0x2a3f65, 0.3);
    fillLight.position.set(-6, 4, -3);
    scene.add(fillLight);

    var rimLight = new THREE.DirectionalLight(0xc9a84c, 1.5);
    rimLight.position.set(-3, 2, 8);
    scene.add(rimLight);

    var loader = new THREE.GLTFLoader();
    var modelsLoaded = 0;

    function checkAllLoaded() {
      modelsLoaded++;
      if (modelsLoaded >= 2) {
        window.__modelsLoaded = true;
        console.log("ALL_MODELS_LOADED");
      }
    }

    loader.load("../model/lambo_lp670.glb", function (gltf) {
      var carModel = gltf.scene;
      var box = new THREE.Box3().setFromObject(carModel);
      var center = box.getCenter(new THREE.Vector3());
      carModel.position.x = -center.x;
      carModel.position.z = -center.z;
      carModel.position.y = -box.min.y;
      carModel.castShadow = true;
      carModel.traverse(function (child) {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
      scene.add(carModel);
      checkAllLoaded();
    });

    loader.load("../model/asian_themed_low_poly_night_city_buildings.glb", function (gltf) {
      var cityModel = gltf.scene;
      cityModel.scale.setScalar(0.015);
      cityModel.position.set(0, -0.2, -10);
      cityModel.traverse(function (child) {
        if (child.isMesh) {
          child.receiveShadow = true;
        }
      });
      scene.add(cityModel);
      checkAllLoaded();
    });

    var groundGeo = new THREE.PlaneGeometry(200, 200);
    var groundMat = new THREE.MeshStandardMaterial({
      color: 0x060608,
      roughness: 0.2,
      metalness: 0.9
    });
    var ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    window.__renderFrame = function (frameIndex) {
      var t = frameIndex / TOTAL_FRAMES;
      var angle = t * Math.PI * 2;
      var radius = 3.2 + Math.sin(t * Math.PI * 4) * 0.3;
      var height = 0.45 + Math.sin(t * Math.PI * 2) * 0.15;

      camera.position.x = Math.cos(angle) * radius;
      camera.position.z = Math.sin(angle) * radius;
      camera.position.y = height;
      camera.lookAt(0, 0.3, 0);

      renderer.render(scene, camera);
      return true;
    };

    window.__totalFrames = TOTAL_FRAMES;
  </script>
</body>
</html>
