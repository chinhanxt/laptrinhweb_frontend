<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Still Capture Renderer</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 35%, rgba(255, 255, 255, 0.18), transparent 34%),
          radial-gradient(circle at 50% 68%, rgba(255, 255, 255, 0.08), transparent 42%),
          linear-gradient(180deg, #0f141c 0%, #090d13 55%, #06080d 100%);
      }

      body {
        font-family: Arial, sans-serif;
      }

      .capture-shell {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      .capture-shell::before {
        content: "";
        position: absolute;
        inset: 7vh 11vw 16vh;
        border-radius: 36px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.01)),
          rgba(255, 255, 255, 0.02);
        box-shadow:
          0 32px 140px rgba(0, 0, 0, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
        filter: blur(0.2px);
      }

      .capture-shell::after {
        content: "";
        position: absolute;
        left: 14vw;
        right: 14vw;
        bottom: 10vh;
        height: 12vh;
        border-radius: 999px;
        background: radial-gradient(circle at center, rgba(0, 0, 0, 0.44), transparent 72%);
        filter: blur(18px);
      }

      model-viewer {
        position: relative;
        width: 100%;
        height: 100%;
        background: transparent;
        --progress-bar-color: transparent;
      }
    </style>
    <script
      type="module"
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"
    ></script>
  </head>
  <body>
    <div class="capture-shell">
      <model-viewer
        id="capture-viewer"
        loading="eager"
        reveal="auto"
        camera-controls
        interaction-prompt="none"
        disable-zoom
        disable-pan
        disable-tap
        environment-image="neutral"
        shadow-intensity="0"
        exposure="1.2"
        tone-mapping="commerce"
      >
        <div slot="progress-bar"></div>
      </model-viewer>
    </div>

    <script>
      (function () {
        const viewer = document.getElementById("capture-viewer");

        function pause(ms) {
          return new Promise((resolve) => window.setTimeout(resolve, ms));
        }

        function nextFrame() {
          return new Promise((resolve) => window.requestAnimationFrame(resolve));
        }

        function clamp(value, min, max) {
          return Math.min(max, Math.max(min, value));
        }

        async function settle(frames, delayMs) {
          const totalFrames = typeof frames === "number" ? frames : 6;
          const waitMs = typeof delayMs === "number" ? delayMs : 40;
          for (let i = 0; i < totalFrames; i += 1) {
            await nextFrame();
          }
          if (waitMs > 0) {
            await pause(waitMs);
          }
        }

        function once(target, eventName) {
          return new Promise((resolve) => {
            const handler = (event) => {
              target.removeEventListener(eventName, handler);
              resolve(event);
            };
            target.addEventListener(eventName, handler, { once: true });
          });
        }

        async function waitForModelLoad() {
          if (viewer.loaded) {
            return;
          }
          await once(viewer, "load");
        }

        function assignCamera(preset) {
          viewer.cameraTarget = preset.cameraTarget;
          viewer.cameraOrbit = preset.cameraOrbit;
          viewer.fieldOfView = preset.fieldOfView;
          if (typeof viewer.jumpCameraToGoal === "function") {
            viewer.jumpCameraToGoal();
          }
        }

        function normalizeScale() {
          if (typeof viewer.getDimensions !== "function") {
            return { scaleFactor: 1 };
          }

          const dimensions = viewer.getDimensions();
          const longestSide = Math.max(dimensions.x, dimensions.y, dimensions.z);
          if (!Number.isFinite(longestSide) || longestSide <= 0) {
            return { scaleFactor: 1 };
          }

          const targetLongestSide = 4.8;
          const scaleFactor = clamp(targetLongestSide / longestSide, 0.75, 140);
          viewer.scale = scaleFactor + " " + scaleFactor + " " + scaleFactor;
          if (typeof viewer.updateFraming === "function") {
            viewer.updateFraming();
          }

          return {
            scaleFactor,
            dimensions: {
              x: dimensions.x,
              y: dimensions.y,
              z: dimensions.z
            }
          };
        }

        const api = {
          ready: false,
          currentCarId: null,
          async loadCar(config) {
            if (!config || !config.src || !config.id) {
              throw new Error("Missing car config");
            }

            const loadPromise = once(viewer, "load");
            viewer.src = config.src;
            viewer.exposure = config.exposure || "1.2";
            viewer.scale = "1 1 1";
            assignCamera({
              cameraOrbit: config.cameraOrbit || "320deg 72deg 74%",
              cameraTarget: config.cameraTarget || "0m 0.45m 0m",
              fieldOfView: config.fieldOfView || "24deg"
            });

            if (typeof viewer.dismissPoster === "function") {
              viewer.dismissPoster();
            }

            await loadPromise;
            await waitForModelLoad();
            const scaleInfo = normalizeScale();
            await settle(12, 180);
            this.currentCarId = config.id;
            return {
              id: config.id,
              scaleFactor: scaleInfo.scaleFactor,
              dimensions: scaleInfo.dimensions || null
            };
          },
          async applyPreset(name, preset) {
            if (!preset) {
              throw new Error("Missing capture preset");
            }

            assignCamera(preset);
            await settle(14, 220);
            return { preset: name, id: this.currentCarId };
          }
        };

        window.__stillCapture = api;

        customElements.whenDefined("model-viewer").then(async function () {
          await settle(4, 0);
          api.ready = true;
          console.log("still-capture renderer ready");
        });
      })();
    </script>
  </body>
</html>
